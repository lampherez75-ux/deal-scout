<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal Scout - Compare Clothing Prices</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    h1 { font-size: 48px; margin-bottom: 16px; color: #e94560; }
    p { font-size: 18px; color: #a0a0a0; max-width: 500px; line-height: 1.6; margin-bottom: 32px; }
    .cta { background: #e94560; color: #fff; text-decoration: none; padding: 16px 32px; border-radius: 8px; font-size: 18px; font-weight: 600; transition: background 0.2s; }
    .cta:hover { background: #d63d56; }
    .features { display: flex; gap: 24px; margin-top: 48px; flex-wrap: wrap; justify-content: center; }
    .feature { background: #16213e; padding: 24px; border-radius: 12px; width: 200px; }
    .feature h3 { color: #4ecca3; margin-bottom: 8px; }
    .feature p { font-size: 14px; margin: 0; }
  </style>
</head>
<body>
  <h1>Deal Scout 🦅</h1>
  <p>Compare clothing prices across Amazon, eBay, Walmart and more. Find the best deals instantly while you shop.</p>
  <a href="https://chrome.google.com/webstore" class="cta">Add to Chrome - It's Free</a>
  <div class="features">
    <div class="feature">
      <h3>Free</h3>
      <p>5 price searches per month at no cost</p>
    </div>
    <div class="feature">
      <h3>Fast</h3>
      <p>Instantly compare prices across top retailers</p>
    </div>
    <div class="feature">
      <h3>Save</h3>
      <p>Never overpay again</p>
    </div>
  </div>
</body>
</html>
